version: '3.8'

services:
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    networks:
      - kudileya-network

  api:
    build:
      context: ../api-kudileya-backend/
      dockerfile: Dockerfile
      target: runner
    image: kudileya-api:latest
    container_name: kudileya-api
    restart: unless-stopped
    ports:
      - '3333:3333'
    environment:
      - NODE_ENV=production
      - PORT=3333
      - HOST=0.0.0.0
      - ADMIN_KEY=${ADMIN_KEY:-change-me-in-production}
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - AI_MODEL=${AI_MODEL:-gemini-1.5-flash}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10485760}
      - CACHE_TTL=${CACHE_TTL:-300}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      - RATE_LIMIT_TIME_WINDOW=${RATE_LIMIT_TIME_WINDOW:-900000}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    networks:
      - kudileya-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  redis:
    image: redis:latest
    platform: linux/amd64
    command: redis-server --requirepass default
    environment:
      REDIS_USER: default
      REDIS_PASSWORD: default
    ports:
      - "6379:6379"
    networks:
      - kudileya-network

  postgres:
    image: postgres:latest
    platform: linux/amd64
    environment:
      POSTGRES_USER: default
      POSTGRES_PASSWORD: default
      POSTGRES_DB: default
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - kudileya-network

  waha:
    image: devlikeapro/waha:latest
    platform: linux/amd64
    environment:
      WAHA_DASHBOARD_USERNAME: admin
      WAHA_DASHBOARD_PASSWORD: kudileya2026
      WAHA_API_KEY: kudileya2026
      WHATSAPP_API_USER: admin
      WHATSAPP_API_KEY: kudileya2026
      WHATSAPP_HOOK_URL: http://n8n:5678/webhook/webhook
      WHATSAPP_DEFAULT_ENGINE: GOWS
      WHATSAPP_HOOK_EVENTS: message
    volumes:
      - waha_sessions:/app/.sessions
      - waha_media:/app/.media
    ports:
      - "3000:3000"
    networks:
      - kudileya-network

  n8n:
    image: n8nio/n8n:latest
    platform: linux/amd64
    environment:
      WEBHOOK_URL: http://172.209.209.203:5678
      N8N_HOST: 172.209.209.203
      GENERIC_TIMEZONE: America/Sao_Paulo
      N8N_LOG_LEVEL: debug
      N8N_SECURE_COOKIE: false
      N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE: true
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - kudileya-network

networks:
  kudileya-network:
    driver: bridge

volumes:
  pgdata:
  waha_sessions:
  waha_media:
  n8n_data:
